<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Dashboard{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='transitions.css') }}">
    <style>
        :root {
            --orange: #EF820D;
            --blue:   #0d7aef;
            --dim:    #888;
            --subtle: #e0dcd6;
            --text:   #1a1a1a;
            --bg:     #f8f5f0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: var(--bg);
            font-family: Georgia, serif;
            color: var(--text);
        }
    </style>
    {% block extra_styles %}{% endblock %}
</head>
<body>
    <div id="pt-container">
        {% block content %}{% endblock %}
    </div>
    <div id="pt-sparkles"></div>
    <script src="{{ url_for('static', filename='transitions.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
