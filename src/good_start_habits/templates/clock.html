{% extends "base.html" %}

{% block title %}Clock{% endblock %}

{% block extra_styles %}
<style>
html, body {
    height: 100vh;
    overflow: hidden;
    margin: 0;
    padding: 0;
}

#pt-container {
    position: relative;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    height: 110vh;
    overflow: hidden;
    background: #FFFFFF;
}

/* ── Train widget ─────────────────────────────────────────── */
#train-widget {
    position: fixed;
    top: 18px;
    right: 16px;
    z-index: 25;
    width: 348px;
    background: rgba(255,255,255,0.95);
    border-top: 5px solid #FFE600;
    font-family: 'VT323', monospace;
    font-size: 16px;
}
.tw-status {
    text-align: center;
    padding: 3px 10px 1px;
    font-size: 14px;
    letter-spacing: 0.1em;
    min-height: 20px;
}
.tw-s-ok   { color: #00C851; }
.tw-s-late { color: #FF6B00; }
.tw-s-dim  { color: #999; }
.tw-s-err  { color: #FF1493; font-size: 12px; }
.tw-scene {
    display: flex;
    align-items: flex-end;
    padding: 4px 8px 6px;
}
.tw-side {
    flex: 0 0 76px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
}
.tw-walk-min { font-size: 11px; color: #888; }
.tw-side-lbl { font-size: 11px; color: #888; letter-spacing: 0.07em; }
.tw-leave-big {
    font-family: 'Limelight', monospace;
    font-size: 20px;
    color: #9B30FF;
    text-shadow: 2px 2px 0 #111;
    line-height: 1;
}
.tw-work-big {
    font-family: 'Limelight', monospace;
    font-size: 18px;
    color: #111;
    line-height: 1;
}
.tw-ontime-yes { color: #00C851; }
.tw-ontime-no  { color: #FF1493; }
.tw-center {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
}
.tw-plat-label { font-size: 12px; color: #555; letter-spacing: 0.05em; }
.tw-train-times { font-size: 14px; color: #111; letter-spacing: 0.05em; text-align: center; }
.tw-dep-late  { color: #FF6B00; }
.tw-dep-sched { color: #aaa; font-size: 11px; }
#tw-alts {
    border-top: 1px solid #E8E8E8;
    padding: 3px 10px 4px;
    font-size: 13px;
}
.tw-alt-row { display: flex; align-items: baseline; padding: 1px 0; gap: 4px; }
.tw-alt-leave {
    font-family: 'Limelight', monospace;
    font-size: 16px;
    color: #333;
    min-width: 50px;
}
.tw-alt-info { flex: 1; font-size: 12px; color: #555; }
.tw-alt-ok   { color: #00C851; }
.tw-alt-no   { color: #FF1493; }
.tw-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 3px 10px 4px;
    border-top: 1px solid #E8E8E8;
    background: #F8F8F8;
    font-size: 12px;
    color: #aaa;
}
#tw-resync {
    background: none;
    border: 1.5px solid #ccc;
    border-radius: 3px;
    cursor: pointer;
    font-family: 'VT323', monospace;
    font-size: 14px;
    padding: 1px 8px;
    color: #555;
    transition: background 0.1s, color 0.1s;
}
#tw-resync:hover { background: #FFE600; border-color: #111; color: #111; }

/* ── Walking figure animations ──────────────────────────── */
@keyframes tw-walk-bob {
    0%, 100% { transform: translateY(0); }
    50%       { transform: translateY(-1.5px); }
}
@keyframes tw-leg-f {
    0%, 100% { transform: rotate(-22deg); }
    50%       { transform: rotate(22deg); }
}
@keyframes tw-leg-b {
    0%, 100% { transform: rotate(22deg); }
    50%       { transform: rotate(-22deg); }
}
@keyframes tw-arm-f {
    0%, 100% { transform: rotate(18deg); }
    50%       { transform: rotate(-18deg); }
}
@keyframes tw-arm-b {
    0%, 100% { transform: rotate(-18deg); }
    50%       { transform: rotate(18deg); }
}
@keyframes tw-wheel-spin {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
}
@keyframes tw-smoke {
    0%   { opacity: 0.65; transform: translateY(0) scale(0.5); }
    100% { opacity: 0;    transform: translateY(-18px) scale(1.4); }
}
.tw-figure { animation: tw-walk-bob 0.55s ease-in-out infinite; }
.tw-figure .tw-lf { animation: tw-leg-f 0.55s ease-in-out infinite; transform-origin: 15px 29px; }
.tw-figure .tw-lb { animation: tw-leg-b 0.55s ease-in-out infinite; transform-origin: 15px 29px; }
.tw-figure .tw-af { animation: tw-arm-f 0.55s ease-in-out infinite; transform-origin: 15px 14px; }
.tw-figure .tw-ab { animation: tw-arm-b 0.55s ease-in-out infinite; transform-origin: 15px 14px; }
.tw-train-svg .tw-wh {
    animation: tw-wheel-spin 0.75s linear infinite;
    transform-box: fill-box;
    transform-origin: 50% 50%;
}
.tw-train-svg .tw-sm     { animation: tw-smoke 1.8s ease-out infinite; }
.tw-train-svg .tw-sm.d1  { animation-delay: 0s;   }
.tw-train-svg .tw-sm.d2  { animation-delay: 0.6s; }
.tw-train-svg .tw-sm.d3  { animation-delay: 1.2s; }

/* TV test-card rainbow stripe at very top */
#pt-container::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 6px;
    z-index: 20;
    background: linear-gradient(90deg,
        #FF1493  0%     14.28%,
        #FF6B00  14.28% 28.57%,
        #FFE600  28.57% 42.85%,
        #00C851  42.85% 57.14%,
        #00B4D8  57.14% 71.42%,
        #9B30FF  71.42% 85.71%,
        #FF00CC  85.71% 100%
    );
}

/* Squiggle SVG sits behind everything */
.squiggle-svg {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    z-index: 0;
    opacity: 0.85;
}

/* Clock face */
.clock-content {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1rem;
}

#clock {
    font-family: 'Limelight', monospace;
    font-size: 26vw;
    line-height: 1;
    letter-spacing: -0.03em;
    color: #9B30FF;
    text-shadow: 8px 8px 0 #111111;
}

#status {
    font-size: 3vw;
    line-height: 1;
    background: #FFE600;
    border: 3px solid #111111;
    box-shadow: 4px 4px 0 #111111;
    padding: 0.05em 0.6em;
}
</style>
{% endblock %}

{% block content %}

    Style: scattered short squiggles + target circles + coloured dots/dashes,

    pink/teal/yellow accents).
-->

                  stroke="#111111" stroke-width="2.5" fill="none" stroke-linecap="round"/>

            <!-- S3 horizontal 3-bump, right side -->

                  stroke="#111111" stroke-width="2.5" fill="none" stroke-linecap="round"/>

                  stroke="#111111" stroke-width="2.5" fill="none" stroke-linecap="round"/>

            <!-- S5 horizontal 2-bump, centre -->
            <path d="M 235,215 Q 243,203 250,215 Q 257,227 265,215"

                  stroke="#111111" stroke-width="2.5" fill="none" stroke-linecap="round"/>

            <!-- S8 horizontal 2-bump, lower-right -->

            <!-- ══ PLAIN BLACK HOLLOW CIRCLES ═══════════════════════════ -->
            <circle cx="285" cy="282" r="13" stroke="#111111" stroke-width="2.5" fill="none"/>
            <circle cx="158" cy="382" r="11" stroke="#111111" stroke-width="2.5" fill="none"/>

            <!-- ══ PINK HOLLOW RINGS ══════════════════════════════════════ -->

            <circle cx="368" cy="345" r="11" stroke="#FF1493" stroke-width="3" fill="none"/>

            <!-- ══ TEAL HOLLOW RINGS ══════════════════════════════════════ -->
            <circle cx="98"  cy="172" r="12" stroke="#00B4D8" stroke-width="3" fill="none"/>
            <circle cx="355" cy="170" r="10" stroke="#00B4D8" stroke-width="3" fill="none"/>

            <circle cx="352" cy="155" r="8" fill="#FF1493"/>

            <circle cx="28"  cy="148" r="7" fill="#00B4D8"/>

            <circle cx="138" cy="318" r="3"   fill="#111111"/>

            <circle cx="30"  cy="270" r="3.5" fill="#111111"/>
        </pattern>
    </defs>
    <rect width="100%" height="100%" fill="url(#sq-pattern)"/>
</svg>

<div id="train-widget">

  <!-- Status badge -->
  <div class="tw-status" id="tw-status-row">

<div class="clock-content">
    <h1 id="clock" data-rotation="{{ rotation_interval if (active and auto_swap) else 0 }}"></h1>
    <p id="status">{% if active %}☀{% else %}🌙{% endif %}</p>

{% block scripts %}
<script>
    function tick() {
        var now = new Date();
        document.getElementById('clock').textContent = now.toLocaleTimeString('en-GB', {
            hour: '2-digit', minute: '2-digit', hour12: false
        });
    }
    setInterval(tick, 1000);
    tick();

    // Diagonal scroll: shift SVG pattern origin by 0.4px/frame, wrap at tile size
    var sqOffset = 0;
    var sqPattern = document.getElementById('sq-pattern');
    function scrollSquiggles() {
        sqOffset = (sqOffset + 0.4) % 400;
        sqPattern.setAttribute('x', sqOffset);
        sqPattern.setAttribute('y', sqOffset);
        requestAnimationFrame(scrollSquiggles);
    }
    requestAnimationFrame(scrollSquiggles);

    var rotation = Number(document.getElementById('clock').dataset.rotation);
    var frozen = new URLSearchParams(window.location.search).get('freeze') === '1';
    if (rotation > 0 && !frozen) {
        var dest = Math.random() < 0.5 ? '/budget' : '/habits';
        ptNavigate(dest, 'random', rotation);
    }

    // ── Train widget ────────────────────────────────────────────────────────
    (function () {
        var pollTimer = null;

        function esc(s) {
            return String(s || '').replace(/[&<>"']/g, function (c) {
                return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
            });
        }

        function setText(id, val) {
            var el = document.getElementById(id);
            if (el) el.textContent = val;
        }
        function setHTML(id, val) {
            var el = document.getElementById(id);
            if (el) el.innerHTML = val;
        }

        function renderTrains(data) {
            var statusRow = document.getElementById('tw-status-row');
            var alts      = document.getElementById('tw-alts');
            var btn       = document.getElementById('tw-resync');
            var upd       = document.getElementById('tw-updated');

            var refreshing = data.status === 'refreshing' || data.status === 'loading';
            btn.textContent = refreshing ? '⟳ …' : '↺ Resync';
            if (data.fetched_at) upd.textContent = 'Updated ' + data.fetched_at;

            if (refreshing) schedulePoll(3000);

            if (data.status === 'unavailable' || data.status === 'error') {
                statusRow.innerHTML = '<span class="tw-s-err">' + esc(data.error || 'Unavailable') + '</span>';
                return;
            }

            var trains = data.trains || [];

            if (refreshing && !trains.length) {
                statusRow.innerHTML = '<span class="tw-s-dim">FETCHING LIVE DATA…</span>';
                return;
            }
            if (!trains.length) {
                statusRow.innerHTML = '<span class="tw-s-dim">NO ACTIVE TRAINS</span>';
                return;
            }

            var rec    = trains.find(function (t) { return t.recommended; }) || trains[0];
            var others = trains.filter(function (t) { return t !== rec; }).slice(0, 2);

            // Status badge
            var isDelayed = rec.dep_delayed || rec.arr_delayed;
            statusRow.innerHTML = isDelayed
                ? '<span class="tw-s-late">⚠ DELAYED</span>'
                : '<span class="tw-s-ok">● ON TIME</span>';

            // Leave time
            setText('tw-leave', rec.leave_home_by || '--:--');

            // Platform
            setText('tw-plat', rec.platform || '–');

            // Departure time
            var depHtml = esc(rec.estimated_dep || '--:--');
            if (rec.dep_delayed && rec.scheduled_dep && rec.scheduled_dep !== rec.estimated_dep) {
                depHtml = '<span class="tw-dep-late">' + esc(rec.estimated_dep) + '</span>'
                        + ' <span class="tw-dep-sched">(' + esc(rec.scheduled_dep) + ')</span>';
            }
            setHTML('tw-dep', depHtml);

            // Arrival time
            var arrHtml = esc(rec.estimated_arr || '--:--');
            if (rec.arr_delayed && rec.scheduled_arr && rec.scheduled_arr !== rec.estimated_arr) {
                arrHtml = '<span class="tw-dep-late">' + esc(rec.estimated_arr) + '</span>';
            }
            setHTML('tw-arr', arrHtml);

            // Work arrival + on-time icon
            setText('tw-work', rec.work_arrival || '--:--');
            setHTML('tw-ontime', rec.arrives_on_time
                ? '<span class="tw-ontime-yes"> ✓</span>'
                : '<span class="tw-ontime-no"> ✗</span>');

            // Alternatives
            if (others.length) {
                alts.style.display = '';
                var html = '';
                others.forEach(function (t) {
                    var p = t.platform ? ' p' + esc(t.platform) : '';
                    var d = t.dep_delayed ? ' <span style="color:#FF6B00">⚠</span>' : '';
                    var ws = t.arrives_on_time
                        ? '<span class="tw-alt-ok">✓</span>'
                        : '<span class="tw-alt-no">✗</span>';
                    html += '<div class="tw-alt-row">';
                    html += '<span class="tw-alt-leave">→ ' + esc(t.leave_home_by) + '</span>';
                    html += '<span class="tw-alt-info"> dep ' + esc(t.estimated_dep) + p + d
                          + ' · work ' + esc(t.work_arrival) + ' ' + ws + '</span>';
                    html += '</div>';
                });
                alts.innerHTML = html;
            } else {
                alts.style.display = 'none';
            }
        }

        function schedulePoll(ms) {
            if (pollTimer) clearTimeout(pollTimer);
            pollTimer = setTimeout(function () { trainFetch(false); }, ms);
        }

        function trainFetch(force) {
            fetch('/api/trains' + (force ? '?refresh=1' : ''))
                .then(function (r) { return r.json(); })
                .then(renderTrains)
                .catch(function () {
                    var sr = document.getElementById('tw-status-row');
                    if (sr) sr.innerHTML = '<span class="tw-s-err">Connection error</span>';
                });
        }

        window.trainResync = function () {
            if (pollTimer) clearTimeout(pollTimer);
            document.getElementById('tw-resync').textContent = '⟳ …';
            trainFetch(true);
        };

        trainFetch(false);
        setInterval(function () { trainFetch(false); }, 60000);
    })();
</script>
{% endblock %}
